{% extends "library/base.html" %}

{% block title %}เข้าสู่ระบบ - Theparak Library{% endblock %}

{% block content %}
<div class="container-lg py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-body p-5">
                    <!-- Header -->
                    <div class="text-center mb-4">
                        <i class="fas fa-user-circle fa-4x text-primary mb-3"></i>
                        <h2 class="fw-bold">เข้าสู่ระบบ</h2>
                        <p class="text-muted">เข้าสู่บัญชี Theparak Library ของคุณ</p>
                    </div>

                    <!-- Login Form -->
                    <form method="post" novalidate>
                        {% csrf_token %}

                        <!-- Username Field -->
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">ชื่อผู้ใช้</label>
                            <input 
                                type="text" 
                                class="form-control form-control-lg" 
                                id="username" 
                                name="username"
                                placeholder="กรอกชื่อผู้ใช้ของคุณ"
                                required
                                autofocus
                            >
                            <small class="form-text text-muted">ชื่อผู้ใช้มีความแตกต่างระหว่างตัวพิมพ์เล็กและใหญ่</small>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">รหัสผ่าน</label>
                            <div class="input-group">
                                <input 
                                    type="password" 
                                    class="form-control form-control-lg" 
                                    id="password" 
                                    name="password"
                                    placeholder="กรอกรหัสผ่านของคุณ"
                                    required
                                >
                                <button 
                                    class="btn btn-outline-secondary" 
                                    type="button" 
                                    id="togglePassword"
                                    onclick="togglePasswordVisibility()"
                                >
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Remember Me -->
                        <div class="mb-4 form-check">
                            <input 
                                type="checkbox" 
                                class="form-check-input" 
                                id="rememberMe" 
                                name="remember_me"
                            >
                            <label class="form-check-label" for="rememberMe">
                                จดจำฉัน
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                            <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
                        </button>
                    </form>

                    <!-- Divider -->
                    <hr class="my-4">

            <!-- Password Toggle Script -->
            <script>
            function togglePasswordVisibility() {
                const passwordInput = document.getElementById('password');
                const toggleBtn = document.getElementById('togglePassword');
                
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
    } else {
        passwordInput.type = 'password';
        toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
    }
}
</script>
{% endblock %}
